<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>лЎңк·ёмқё вҖ” Kanban Board</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <h1>Kanban Board</h1>
      <p>мһ‘м—…мқ„ мҠӨл§ҲнҠён•ҳкІҢ кҙҖлҰ¬н•ҳм„ёмҡ”</p>
    </div>

    <!-- OAuth лІ„нҠј -->
    <div class="oauth-buttons">
      <button id="btn-google" class="oauth-btn google">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
          <path d="M3.964 10.706c-.18-.54-.282-1.117-.282-1.706s.102-1.166.282-1.706V4.962H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.038l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.962L3.964 6.294C4.672 4.167 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        GoogleлЎң кі„мҶҚн•ҳкё°
      </button>

      <button id="btn-github" class="oauth-btn github">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        GitHubлЎң кі„мҶҚн•ҳкё°
      </button>
    </div>

    <div class="divider"><span>лҳҗлҠ”</span></div>

    <!-- мқҙл©”мқј нғӯ -->
    <div class="auth-tabs">
      <button class="tab-btn active" data-tab="signin">лЎңк·ёмқё</button>
      <button class="tab-btn" data-tab="signup">нҡҢмӣҗк°Җмһ…</button>
    </div>

    <!-- мқҙл©”мқј/нҢЁмҠӨмӣҢл“ң нҸј -->
    <form id="auth-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="auth-email">мқҙл©”мқј</label>
        <input id="auth-email" type="email" placeholder="example@email.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="auth-password">нҢЁмҠӨмӣҢл“ң</label>
        <input id="auth-password" type="password" placeholder="6мһҗ мқҙмғҒ" autocomplete="current-password" required>
      </div>

      <div id="auth-message" class="auth-message hidden"></div>

      <button id="auth-submit" type="submit" class="btn btn-primary btn-full">лЎңк·ёмқё</button>
    </form>

    <p class="auth-footer">
      кі„м •мқҙ м—ҶмңјмӢ к°Җмҡ”?
      <button class="link-btn" id="toggle-tab">нҡҢмӣҗк°Җмһ…</button>
    </p>
  </div>

  <script src="auth.js"></script>
</body>
</html>
